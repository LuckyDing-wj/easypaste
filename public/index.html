<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPaste</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2d2d2d;
      color: #ffd600;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 80%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #ffe082;
    }
    textarea {
      width: 100%;
      height: 60vh;
      background: #1e1e1e;
      color: #ffd600;
      border: 1px solid #ffd600;
      border-radius: 4px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: #ffe082;
      box-shadow: 0 0 5px rgba(255, 214, 0, 0.3);
    }
    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    button {
      background: #ffd600;
      color: #1e1e1e;
      border: none;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #ffe082; }
    button:active { background: #f9a825; }
    .msg {
      font-size: 0.9rem;
      color: #fff176;
      min-height: 1.2em;
    }
    .error { color: #ef5350; }
    .info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 0.3rem;
    }
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.2rem; }
      textarea { height: 50vh; font-size: 16px; }
      .actions { flex-wrap: wrap; }
      button { padding: 0.7rem 1.2rem; font-size: 0.95rem; }
      .msg { width: 100%; margin-top: 0.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EasyPaste</h1>
    <textarea id="content" placeholder="加载中..."></textarea>
    <div class="info">
      <span id="stats">0 字 · 0 行</span>
      <span id="updatedAt"></span>
    </div>
    <div class="actions">
      <button id="saveBtn">保存</button>
      <button id="copyBtn">复制</button>
      <button id="clearBtn">清空</button>
      <span class="msg" id="msg"></span>
    </div>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const msgEl = document.getElementById('msg');
    const statsEl = document.getElementById('stats');
    const updatedAtEl = document.getElementById('updatedAt');

    // 从 URL 提取 secret: ?secret=xxx 或 /clip/xxx
    const urlParams = new URLSearchParams(window.location.search);
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const secret = urlParams.get('secret') || (pathParts.length >= 2 && pathParts[0] === 'clip' ? pathParts[1] : null);

    if (!secret) {
      contentEl.disabled = true;
      saveBtn.disabled = true;
      copyBtn.disabled = true;
      clearBtn.disabled = true;
      contentEl.placeholder = '请通过正确的链接访问';
    }

    function showMsg(text, isError = false) {
      msgEl.textContent = text;
      msgEl.className = 'msg' + (isError ? ' error' : '');
      if (!isError) setTimeout(() => { msgEl.textContent = ''; }, 3000);
    }

    function updateStats() {
      const text = contentEl.value;
      const chars = text.length;
      const lines = text ? text.split('\n').length : 0;
      statsEl.textContent = chars + ' 字 · ' + lines + ' 行';
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    contentEl.addEventListener('input', updateStats);

    // 加载内容
    async function load() {
      if (!secret) return;
      contentEl.placeholder = '加载中...';
      try {
        const res = await fetch('/api/get', {
          headers: { 'X-Clip-Secret': secret }
        });
        if (res.status === 403) {
          showMsg('密钥无效', true);
          return;
        }
        if (!res.ok) {
          showMsg('加载失败: HTTP ' + res.status, true);
          return;
        }
        const data = await res.json();
        contentEl.value = data.content || '';
        updateStats();
        if (data.updatedAt) updatedAtEl.textContent = '上次保存: ' + formatTime(data.updatedAt);
      } catch (e) {
        showMsg('加载失败', true);
      } finally {
        contentEl.placeholder = '在此粘贴内容...';
      }
    }

    // 保存
    saveBtn.addEventListener('click', async () => {
      if (!secret) return;
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/set', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Clip-Secret': secret
          },
          body: JSON.stringify({ content: contentEl.value })
        });
        if (res.status === 403) {
          showMsg('密钥无效', true);
        } else if (!res.ok) {
          showMsg('保存失败: HTTP ' + res.status, true);
        } else {
          showMsg('已保存');
          updatedAtEl.textContent = '上次保存: ' + formatTime(new Date().toISOString());
        }
      } catch (e) {
        showMsg('保存失败', true);
      } finally {
        saveBtn.disabled = false;
      }
    });

    // 复制
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(contentEl.value);
        showMsg('已复制');
      } catch (e) {
        showMsg('复制失败', true);
      }
    });

    // 清空
    clearBtn.addEventListener('click', () => {
      contentEl.value = '';
      contentEl.focus();
    });

    // Ctrl+S 保存
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (secret) saveBtn.click();
      }
    });

    // 粘贴时自动保存
    contentEl.addEventListener('paste', () => {
      setTimeout(() => {
        updateStats();
        if (secret) saveBtn.click();
      }, 100);
    });

    load();
  </script>
</body>
</html>
