<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPaste</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2d2d2d;
      color: #4caf50;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 90%;
      max-width: 700px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #66bb6a;
    }
    input[type="password"] {
      width: 100%;
      background: #1e1e1e;
      color: #4caf50;
      border: 1px solid #4caf50;
      border-radius: 4px;
      padding: 0.8rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      outline: none;
      margin-bottom: 1rem;
    }
    input[type="password"]:focus {
      border-color: #66bb6a;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }
    textarea {
      width: 100%;
      height: 300px;
      background: #1e1e1e;
      color: #4caf50;
      border: 1px solid #4caf50;
      border-radius: 4px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: #66bb6a;
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }
    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    button {
      background: #4caf50;
      color: #1e1e1e;
      border: none;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #66bb6a; }
    button:active { background: #388e3c; }
    .msg {
      font-size: 0.9rem;
      color: #81c784;
      min-height: 1.2em;
    }
    .error { color: #ef5350; }
    #loginView, #mainView { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EasyPaste</h1>

    <div id="loginView">
      <input id="secretInput" type="password" placeholder="输入密钥" />
      <div class="actions">
        <button id="loginBtn">进入</button>
        <span class="msg" id="loginMsg"></span>
      </div>
    </div>

    <div id="mainView">
      <textarea id="content" placeholder="加载中..."></textarea>
      <div class="actions">
        <button id="saveBtn">保存</button>
        <button id="copyBtn">复制</button>
        <button id="clearBtn">清空</button>
        <button id="logoutBtn" style="margin-left:auto;background:#555;color:#ccc;">退出</button>
        <span class="msg" id="msg"></span>
      </div>
    </div>
  </div>

  <script>
    const loginView = document.getElementById('loginView');
    const mainView = document.getElementById('mainView');
    const secretInput = document.getElementById('secretInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMsg');
    const contentEl = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const msgEl = document.getElementById('msg');

    let currentSecret = null;

    function showMsg(el, text, isError = false) {
      el.textContent = text;
      el.className = 'msg' + (isError ? ' error' : '');
      if (!isError) setTimeout(() => { el.textContent = ''; }, 3000);
    }

    function initClipboard(secret) {
      currentSecret = secret;
      loginView.style.display = 'none';
      mainView.style.display = 'block';
      load();
    }

    // 登录
    loginBtn.addEventListener('click', () => {
      const secret = secretInput.value.trim();
      if (!secret) {
        showMsg(loginMsg, '请输入密钥', true);
        return;
      }
      sessionStorage.setItem('clip_secret', secret);
      initClipboard(secret);
    });

    // Enter 键登录
    secretInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    // 退出
    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('clip_secret');
      currentSecret = null;
      mainView.style.display = 'none';
      loginView.style.display = 'block';
      secretInput.value = '';
    });

    // 加载内容
    async function load() {
      if (!currentSecret) return;
      contentEl.placeholder = '加载中...';
      try {
        const res = await fetch('/api/get', {
          headers: { 'X-Clip-Secret': currentSecret }
        });
        if (res.status === 403) {
          showMsg(msgEl, '密钥无效', true);
          return;
        }
        if (!res.ok) {
          showMsg(msgEl, '加载失败: HTTP ' + res.status, true);
          return;
        }
        const data = await res.json();
        contentEl.value = data.content || '';
      } catch (e) {
        showMsg(msgEl, '加载失败', true);
      } finally {
        contentEl.placeholder = '在此粘贴内容...';
      }
    }

    // 保存
    saveBtn.addEventListener('click', async () => {
      if (!currentSecret) return;
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/set', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Clip-Secret': currentSecret
          },
          body: JSON.stringify({ content: contentEl.value })
        });
        if (res.status === 403) {
          showMsg(msgEl, '密钥无效', true);
        } else if (!res.ok) {
          showMsg(msgEl, '保存失败: HTTP ' + res.status, true);
        } else {
          showMsg(msgEl, '已保存');
        }
      } catch (e) {
        showMsg(msgEl, '保存失败', true);
      } finally {
        saveBtn.disabled = false;
      }
    });

    // 复制
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(contentEl.value);
        showMsg(msgEl, '已复制');
      } catch (e) {
        showMsg(msgEl, '复制失败', true);
      }
    });

    // 清空
    clearBtn.addEventListener('click', () => {
      contentEl.value = '';
      contentEl.focus();
    });

    // Ctrl+S 保存
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (currentSecret) saveBtn.click();
      }
    });

    // 启动：检查 sessionStorage
    const savedSecret = sessionStorage.getItem('clip_secret');
    if (savedSecret) {
      initClipboard(savedSecret);
    } else {
      loginView.style.display = 'block';
    }
  </script>
</body>
</html>
