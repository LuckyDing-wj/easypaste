<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPaste</title>
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem('themeMode') || 'system';
    } catch (e) {
      document.documentElement.dataset.theme = 'system';
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      --page: #faf9f5;
      --surface: #faf9f5;
      --surface-raised: #fffdf8;
      --surface-muted: #f0eee6;
      --text: #141413;
      --muted: #73726c;
      --border: #dedcd1;
      --primary: #c96442;
      --primary-hover: #b65333;
      --primary-active: #9f452a;
      --primary-soft: rgba(201, 100, 66, 0.16);
      --on-primary: #141413;
      --success: #629987;
      --warning: #b45309;
      --danger: #b53333;
      --danger-soft: #f3dbcf;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --page: #141413;
      --surface: #141413;
      --surface-raised: #1f1e1d;
      --surface-muted: #262624;
      --text: #faf9f5;
      --muted: #b0aea5;
      --border: #3d3d3a;
      --primary: #d97757;
      --primary-hover: #e08a6e;
      --primary-active: #c46849;
      --primary-soft: rgba(217, 119, 87, 0.20);
      --on-primary: #141413;
      --success: #7ab49f;
      --warning: #e3b65e;
      --danger: #df6666;
      --danger-soft: rgba(181, 51, 51, 0.18);
    }
    @media (prefers-color-scheme: dark) {
      html[data-theme="system"] {
        color-scheme: dark;
        --page: #141413;
        --surface: #141413;
        --surface-raised: #1f1e1d;
        --surface-muted: #262624;
        --text: #faf9f5;
        --muted: #b0aea5;
        --border: #3d3d3a;
        --primary: #d97757;
        --primary-hover: #e08a6e;
        --primary-active: #c46849;
        --primary-soft: rgba(217, 119, 87, 0.20);
        --on-primary: #141413;
        --success: #7ab49f;
        --warning: #e3b65e;
        --danger: #df6666;
        --danger-soft: rgba(181, 51, 51, 0.18);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      min-height: 100%;
    }
    body {
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      min-height: max(100vh, 100dvh);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .container {
      width: 100%;
      min-height: 100vh;
      min-height: max(100vh, 100dvh);
      background: var(--page);
      padding: clamp(1rem, 2vw, 2rem);
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.35rem;
      line-height: 1.2;
      color: var(--text);
      font-weight: 700;
    }
    .theme-switcher {
      display: inline-flex;
      gap: 0.25rem;
      align-items: center;
      padding: 0.25rem;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .theme-option {
      min-height: 36px;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-size: 0.85rem;
      border-color: transparent;
    }
    .theme-option:hover {
      background: var(--surface-raised);
      color: var(--text);
      border-color: transparent;
    }
    .theme-option[aria-pressed="true"] {
      background: var(--surface-raised);
      color: var(--text);
      border-color: var(--border);
      box-shadow: 0 1px 2px rgba(20, 20, 19, 0.08);
    }
    textarea {
      width: 100%;
      flex: 1 1 auto;
      min-height: 16rem;
      background: var(--surface-raised);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 1rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(20, 33, 29, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }
    textarea::placeholder {
      color: var(--muted);
    }
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft), inset 0 1px 2px rgba(20, 33, 29, 0.04);
    }
    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.625rem;
      align-items: center;
    }
    button {
      min-height: 44px;
      background: var(--surface-muted);
      color: var(--text);
      border: 1px solid transparent;
      padding: 0.65rem 1.35rem;
      font-size: 0.95rem;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 650;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 120ms ease;
    }
    #saveBtn {
      background: var(--primary);
      color: var(--on-primary);
    }
    #saveBtn:hover { background: var(--primary-hover); }
    #saveBtn:active { background: var(--primary-active); }
    button:hover {
      background: var(--surface-raised);
      border-color: var(--border);
    }
    button:active {
      transform: translateY(1px);
    }
    button:focus-visible {
      outline: 3px solid var(--primary-soft);
      outline-offset: 2px;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }
    #clearBtn:hover {
      background: var(--danger-soft);
      border-color: var(--danger);
      color: var(--danger);
    }
    button.saved { background: var(--success); color: #fff; }
    .msg {
      font-size: 0.9rem;
      color: var(--success);
      min-height: 1.2em;
    }
    .error { color: var(--danger); }
    .info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.45rem;
    }
    .saved { color: var(--success); }
    .unsaved { color: var(--warning); }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--page);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-size: 1.2rem;
      color: var(--primary);
    }
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 0.75rem;
      }
      .theme-switcher { width: 100%; }
      .theme-option { flex: 1; padding-inline: 0.5rem; }
      h1 { font-size: 1.2rem; }
      textarea { font-size: 16px; }
      .actions { flex-wrap: wrap; }
      button { padding: 0.7rem 1.2rem; font-size: 0.95rem; }
      .msg { width: 100%; margin-top: 0.3rem; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">加载中...</div>
  <div class="container">
    <div class="topbar">
      <h1>EasyPaste</h1>
      <div class="theme-switcher" role="group" aria-label="主题模式">
        <button class="theme-option" type="button" data-theme-option="system" aria-pressed="true">跟随系统</button>
        <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">日间</button>
        <button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">夜间</button>
      </div>
    </div>
    <textarea id="content" placeholder="加载中..."></textarea>
    <div class="info">
      <span id="stats">0 字 · 0 行</span>
      <span id="updatedAt"></span>
    </div>
    <div class="actions">
      <button id="saveBtn">保存</button>
      <button id="copyBtn">复制</button>
      <button id="clearBtn">清空</button>
      <span class="msg" id="msg"></span>
    </div>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const saveBtn = document.getElementById('saveBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const msgEl = document.getElementById('msg');
    const statsEl = document.getElementById('stats');
    const updatedAtEl = document.getElementById('updatedAt');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const themeButtons = Array.from(document.querySelectorAll('[data-theme-option]'));
    const systemTheme = window.matchMedia('(prefers-color-scheme: dark)');

    function getThemeMode() {
      try {
        return localStorage.getItem('themeMode') || 'system';
      } catch (e) {
        return 'system';
      }
    }

    function applyTheme(mode) {
      document.documentElement.dataset.theme = mode;
      try {
        localStorage.setItem('themeMode', mode);
      } catch (e) {}
      themeButtons.forEach(button => {
        button.setAttribute('aria-pressed', String(button.dataset.themeOption === mode));
      });
    }

    themeButtons.forEach(button => {
      button.addEventListener('click', () => applyTheme(button.dataset.themeOption));
    });

    systemTheme.addEventListener('change', () => {
      if (getThemeMode() === 'system') applyTheme('system');
    });

    applyTheme(getThemeMode());

    // 从 URL 提取 secret: ?secret=xxx 或 /clip/xxx
    const urlParams = new URLSearchParams(window.location.search);
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const secret = urlParams.get('secret') || (pathParts.length >= 2 && pathParts[0] === 'clip' ? pathParts[1] : null);

    if (!secret) {
      contentEl.disabled = true;
      saveBtn.disabled = true;
      copyBtn.disabled = true;
      clearBtn.disabled = true;
      contentEl.placeholder = '请通过正确的链接访问';
      loadingOverlay.style.display = 'none';
    }

    let lastSaved = '';
    let unsavedTimer = null;

    function showMsg(text, isError = false) {
      msgEl.textContent = text;
      msgEl.className = 'msg' + (isError ? ' error' : '');
      if (!isError) setTimeout(() => { msgEl.textContent = ''; }, 3000);
    }

    function updateStats() {
      const text = contentEl.value;
      const chars = text.length;
      const lines = text ? text.split('\n').length : 0;
      statsEl.textContent = chars + ' 字 · ' + lines + ' 行';
    }

    function markUnsaved() {
      if (contentEl.value === lastSaved) {
        updatedAtEl.className = 'saved';
        updatedAtEl.textContent = updatedAtEl.dataset.time || '';
        return;
      }
      updatedAtEl.className = 'unsaved';
      updatedAtEl.textContent = '未保存';
    }

    function markSaved(time) {
      lastSaved = contentEl.value;
      updatedAtEl.className = 'saved';
      const text = '上次保存: ' + formatTime(time);
      updatedAtEl.textContent = text;
      updatedAtEl.dataset.time = text;
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    contentEl.addEventListener('input', () => {
      updateStats();
      clearTimeout(unsavedTimer);
      unsavedTimer = setTimeout(markUnsaved, 300);
    });

    // 加载内容
    async function load() {
      if (!secret) return;
      try {
        const res = await fetch('/api/get', {
          headers: { 'X-Clip-Secret': secret }
        });
        if (res.status === 403) {
          showMsg('密钥无效', true);
          return;
        }
        if (!res.ok) {
          showMsg('加载失败: HTTP ' + res.status, true);
          return;
        }
        const data = await res.json();
        contentEl.value = data.content || '';
        lastSaved = contentEl.value;
        updateStats();
        if (data.updatedAt) markSaved(data.updatedAt);
      } catch (e) {
        showMsg('加载失败', true);
      } finally {
        contentEl.placeholder = '在此粘贴内容...';
        loadingOverlay.style.display = 'none';
      }
    }

    // 保存
    let saving = false;
    saveBtn.addEventListener('click', async () => {
      if (!secret || saving) return;
      saving = true;
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/set', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Clip-Secret': secret
          },
          body: JSON.stringify({ content: contentEl.value })
        });
        if (res.status === 403) {
          showMsg('密钥无效', true);
        } else if (!res.ok) {
          showMsg('保存失败: HTTP ' + res.status, true);
        } else {
          showMsg('已保存');
          saveBtn.classList.add('saved');
          setTimeout(() => saveBtn.classList.remove('saved'), 1000);
          markSaved(new Date().toISOString());
        }
      } catch (e) {
        showMsg('保存失败', true);
      } finally {
        saveBtn.disabled = false;
        saving = false;
      }
    });

    // 复制
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(contentEl.value);
        showMsg('已复制');
      } catch (e) {
        showMsg('复制失败', true);
      }
    });

    // 清空
    clearBtn.addEventListener('click', () => {
      contentEl.value = '';
      contentEl.focus();
      updateStats();
      markUnsaved();
    });

    // Ctrl+S 保存
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (secret) saveBtn.click();
      }
    });

    // 粘贴自动保存（防抖）
    let pasteTimer = null;
    contentEl.addEventListener('paste', () => {
      clearTimeout(pasteTimer);
      pasteTimer = setTimeout(() => {
        updateStats();
        if (secret) saveBtn.click();
      }, 300);
    });

    load();
  </script>
</body>
</html>
